<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Калькулятор</title>
<link rel="stylesheet" href="style.css">
<style>
.west1{
background-color:black;
height:155px;
width:176px;
border-radius:5%;
border:5px ridge #1B1B1B;
}
.west2{
background-color:#1B1B1B;
color:white;
}

.west3{
background-color:#0b9e15;
}
.west7{
background-color:#007FFF;
}



</style>
</head>

<body>
<h2>калькулятор</h2>

<div class="west1">
<table>
<input type="text" id="display" disabled>

<div class="buttons">
<tr>
<td></td>
<td></td>

<td><button data-value="(" class="west2">(</button></td>
<td><button data-value=")" class="west2">)</button></td>
<td><button data-value="C" class="west2">C</button></td>
<td><button data-value="/" class="west3">/</button></td>
<td><button id="delete" class="west3">⌫</button></td>
</tr>
<tr>
<td></td>
<td></td>

<td><button data-value="7" class="west2">7</button></td>
<td><button data-value="8" class="west2">8</button></td>
<td><button data-value="9" class="west2">9</button></td>
<td><button data-value="-" class="west3">-</button></td>
</tr>
<tr>
<td></td>
<td></td>

<td><button data-value="4" class="west2">4</button></td>
<td><button data-value="5" class="west2">5</button></td>
<td><button data-value="6" class="west2">6</button></td>
<td><button data-value="+" class="west3">+</button></td>
</tr>

<tr>
<td></td>
<td></td>

<td><button data-value="1" class="west2">1</button></td>
<td><button data-value="2" class="west2">2</button></td>
<td><button data-value="3" class="west2">3</button></td>
<td><button data-value="*" class="west3">*</button></td>
</tr>

<tr>
<td></td>
<td></td>
<td><button data-value="%" class="west2">%</button></td>
<td><button data-value="0" class="west2">0</button></td>
<td><button data-value="." class="west2">.</button></td>
<td><button id="equal" class="west7">=</button></td>




</tr>
 <script>
 var arr= [{сила:7},{броня:0},{рівень_життя:35}]; 
 console.log(arr)
 
 var mass=[]
 
 for(let i=0 ;i<=400; i++){
     i=i+100
  mass.push(i)
 }
 
  console.log(mass)
 </script>

<script src="script.js"></script>
</table>
</div>
</body>
</html>
